name: Checks

on:
  pull_request:
    paths-ignore:
      - '.github/**'

jobs:
  checks:
    name: Shared checks
    uses: atls/shared/.github/workflows/checks.yaml@master
    permissions: write-all
    with:
      node-version: '22'

  raijin:
    name: Raijin checks
    env:
      NODE_VERSION: '22'
    runs-on: ubuntu-latest
    permissions: read-all

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install
        uses: ./.github/actions/install

      - name: Raijin checks
        run: yarn raijin:check
