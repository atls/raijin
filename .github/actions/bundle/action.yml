name: Create yarn bundle composite action
description: Create yarn bundle

runs:
  using: composite

  steps:
    - name: Bundle yarn
      shell: bash
      run: |
        source .env
        export NODE_OPTIONS
        yarn workspace @atls/yarn-cli version patch
        yarn cli:build
        cp yarn/cli/dist/yarn.mjs .yarn/releases/yarn.mjs
        yarn format
