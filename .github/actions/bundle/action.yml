name: Create yarn bundle composite action
description: Create yarn bundle

runs:
  using: composite

  steps:
    - name: Bundle yarn
      shell: bash
      run: |
        source .env
        export NODE_OPTIONS
        yarn workspace @atls/yarn-cli version patch
        yarn cli:build
        export YARN_IGNORE_PATH=1
        node yarn/cli/dist/runtime/yarn.mjs format
