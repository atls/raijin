name: Checks composite action
description: Run checks

inputs:
  GITHUB_TOKEN:
    required: true
    description: GitHub token

runs:
  using: composite

  steps:
    - name: Tooling checks
      shell: bash
      run: |
        node scripts/tooling/generate-artifacts.mjs
        git diff --exit-code -- docs/tooling .agents
        untracked_generated="$(git ls-files --others --exclude-standard -- docs/tooling .agents)"
        if [ -n "$untracked_generated" ]; then
          echo "Untracked generated files detected:"
          echo "$untracked_generated"
          exit 1
        fi
        node scripts/tooling/check-localization-sync.mjs
        node scripts/tooling/run-deterministic-smoke.mjs

    - name: Checks
      env:
        GITHUB_TOKEN: ${{ inputs.GITHUB_TOKEN }}
      shell: bash
      run: |
        source .env
        export NODE_OPTIONS
        yarn checks run
