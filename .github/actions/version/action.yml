name: Publish composite action
description: Patch versions for changed packages before publish

inputs:
  GITHUB_TOKEN:
    required: true

runs:
  using: composite

  steps:
    - name: Patch version
      shell: bash
      run: |
        source .env
        export NODE_OPTIONS
        yarn workspaces changed foreach -vt --exclude '{.,@atls/yarn-cli}' version patch
      env:
        GITHUB_TOKEN: ${{ inputs.GITHUB_TOKEN }}
