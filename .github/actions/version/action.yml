name: Publish composite action
description: Apply deferred versions for changed packages before publish

inputs:
  GITHUB_TOKEN:
    required: true

outputs:
  release_required:
    description: Whether merged changes produced a Raijin deferred version record
    value: ${{ steps.version.outputs.release_required }}

runs:
  using: composite

  steps:
    - name: Apply deferred versions
      id: version
      shell: bash
      run: |
        source .env
        export NODE_OPTIONS
        yarn release version defer
        if ! find .yarn/versions -maxdepth 1 -type f -name '*.yml' | grep -q .; then
          echo "release_required=false" >> "$GITHUB_OUTPUT"
          echo "No Raijin release target"
          exit 0
        fi
        echo "release_required=true" >> "$GITHUB_OUTPUT"
        yarn version apply --all
      env:
        GITHUB_TOKEN: ${{ inputs.GITHUB_TOKEN }}
